name: GitHub Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: chandutalawar187-blip
          template: classic
          base: "header, repositories, metadata"
          repositories: 100
          repositories_batch: 100
          repositories_forks: false
          repositories_affiliations: owner
          config_timezone: "Asia/Kolkata"
          config_padding: "10%"
          plugins_traffic: yes
          plugins_followup: yes
          plugins_followup_sections: repositories
          plugins_languages: yes
          plugins_languages_analysis_type: commit
          plugins_languages_analysis_timeout: 15
          plugins_languages_categories: markup, programming
          plugins_languages_colors: "github"
          plugins_languages_limit: 8
          plugins_languages_recent_categories: markup, programming
          plugins_languages_recent_load: 300
          plugins_languages_recent_days: 14
          plugins_achievements: yes
          plugins_achievements_threshold: C
          plugins_achievements_secrets: yes
          plugins_achievements_display: detailed
          plugins_achievements_limit: 0
